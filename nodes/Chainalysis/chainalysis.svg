<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="chainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E3A5F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="15" fill="url(#chainGrad)"/>
  <g fill="white" transform="translate(15, 15)">
    <!-- Chain links -->
    <ellipse cx="20" cy="20" rx="12" ry="8" fill="none" stroke="white" stroke-width="3" transform="rotate(-45 20 20)"/>
    <ellipse cx="35" cy="35" rx="12" ry="8" fill="none" stroke="white" stroke-width="3" transform="rotate(-45 35 35)"/>
    <ellipse cx="50" cy="50" rx="12" ry="8" fill="none" stroke="white" stroke-width="3" transform="rotate(-45 50 50)"/>
    <!-- Analysis dots -->
    <circle cx="55" cy="15" r="4" fill="#60A5FA"/>
    <circle cx="65" cy="25" r="3" fill="#60A5FA"/>
    <circle cx="15" cy="55" r="3" fill="#60A5FA"/>
    <circle cx="25" cy="65" r="4" fill="#60A5FA"/>
  </g>
</svg>
